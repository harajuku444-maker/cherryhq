<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chela HQ. ✦</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#FDF8F5;font-family:'DM Sans','Helvetica Neue',sans-serif;min-height:100vh;}
input[type=range]{width:100%;accent-color:#EAA8C2;}
input[type=checkbox]{accent-color:#EAA8C2;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:rgba(0,0,0,0.04);}
::-webkit-scrollbar-thumb{background:#EAA8C2;border-radius:3px;}
details summary{list-style:none;}
details summary::-webkit-details-marker{display:none;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ── COLORS ──────────────────────────────────────────────
const C={
  pink:"#F5C5D8",pinkMed:"#EAA8C2",pinkDeep:"#C4688A",
  lav:"#DDD8F8",lavMed:"#C3C0DB",lavDeep:"#8870C0",
  mint:"#C4EAD8",mintMed:"#7DBFA0",mintDeep:"#2E8060",
  peach:"#FAD8C0",peachMed:"#E8A878",
  yellow:"#FFF3B0",yellowMed:"#C8A800",
  blue:"#C4DCFA",blueMed:"#78A8E0",blueDeep:"#2860B0",
  rose:"#F5C4D4",roseMed:"#D87898",
  lilac:"#DFC8F5",lilacMed:"#A870D8",lilacDeep:"#6830A0",
  charcoal:"#1A1A1A",gray:"#888",lgray:"#E8E8E8",
  cream:"#FDF8F5",white:"#fff",
};

const TABS=[
  {id:"hq",      emoji:"✦",label:"Chela HQ",           color:C.pink,  dark:C.pinkMed, content:"#FFF0F6"},
  {id:"tasks",   emoji:"✔",label:"Tasks for the Doll",  color:C.mint,  dark:C.mintMed, content:"#F0FBF6"},
  {id:"projects",emoji:"◈",label:"Projects",            color:C.lav,   dark:C.lavMed,  content:"#F4F0FF"},
  {id:"money",   emoji:"💸",label:"Money + Invoices",   color:C.peach, dark:C.peachMed,content:"#FFF6F0"},
  {id:"reset",   emoji:"↻",label:"Reset Studio",        color:C.yellow,dark:C.yellowMed,content:"#FFFDF0"},
  {id:"bizops",  emoji:"⌘",label:"Biz Ops",             color:C.blue,  dark:C.blueMed, content:"#F0F6FF"},
  {id:"moodboard",emoji:"✿",label:"Moodboard",          color:C.rose,  dark:C.roseMed, content:"#FFF0F4"},
  {id:"personal",emoji:"♡",label:"Personal",            color:C.lilac, dark:C.lilacMed,content:"#F8F0FF"},
  {id:"content",  emoji:"📲",label:"Content Calendar",   color:C.rose,  dark:C.roseMed, content:"#FFF0F4"},
];

const AREAS=["C DOT","Gallery","Store","Content","Life","Design","Personal Brand","Admin"];
const TASK_STATUSES=["Not Started","In Progress","Done","Blocked"];
const PROJ_STATUSES=["Planning","Active","Paused","Complete","Archived"];
const INV_STATUSES=["Draft","Sent","Paid","Overdue"];
const RUNWAY_CATS=["Gallery","Public Art / Advisory","Social Media Content","C DOT.","Personal","Family"];
const PROJ_TYPES=["Gallery","Public Art","Content","C DOT","Business Dev","Personal","Admin"];
const PHONE="+12026993787";

const STATUS_COLORS={
  "Not Started":C.lgray,"In Progress":C.yellow,"Done":C.mint,"Blocked":"#FFBBBB",
  "Planning":C.lav,"Active":C.mint,"Paused":C.peach,"Complete":"#B8F0C8","Archived":C.lgray,
  "Draft":C.lgray,"Sent":C.blue,"Paid":"#B8F0C8","Overdue":"#FFBBBB",
  "Income":"#C0F0D0","Expense":"#FFD0D0",
};

const DEFAULT_AFFIRMATIONS=[
  "I am magnetic. Everything I need is drawn to me.",
  "My art and vision create real impact in the world.",
  "I build wealth, community, and legacy simultaneously.",
  "CMA. is exactly where it needs to be today.",
  "I move with intention. My decisions are powerful.",
  "My creativity is my currency — and it is limitless.",
  "I am a sought-after voice in the art world.",
  "Rest is productive. Joy is strategy.",
];

// ── STORAGE (localStorage + Google Sheets via JSONP) ─
const store={
  _url:localStorage.getItem("chelahq_syncurl")||"",
  get(key,def=null){
    try{const v=localStorage.getItem("chelahq_"+key);return v!==null?JSON.parse(v):def;}
    catch{return def;}
  },
  set(key,val){
    try{
      const str=JSON.stringify(val);
      localStorage.setItem("chelahq_"+key,str);
      // Write to Google Sheets via no-cors (fire and forget)
      if(this._url){
        fetch(this._url,{
          method:"POST",
          mode:"no-cors",
          headers:{"Content-Type":"text/plain"},
          body:JSON.stringify({key:"chelahq_"+key,value:str})
        }).catch(()=>{});
      }
    }catch(e){console.error(e);}
  },
  setUrl(url){
    this._url=url;
    localStorage.setItem("chelahq_syncurl",url);
  },
  // Use JSONP to bypass CORS for reads
  syncAll(){
    if(!this._url)return Promise.resolve({ok:false,msg:"No sync URL set."});
    return new Promise((resolve)=>{
      const cbName="chelahq_cb_"+Date.now();
      const timeoutId=setTimeout(()=>{
        delete window[cbName];
        if(s.parentNode)s.parentNode.removeChild(s);
        resolve({ok:false,msg:"Timed out. Make sure your URL ends in /exec and is deployed as Anyone."});
      },12000);
      window[cbName]=(data)=>{
        clearTimeout(timeoutId);
        delete window[cbName];
        if(s.parentNode)s.parentNode.removeChild(s);
        if(data.success&&data.data){
          Object.entries(data.data).forEach(([k,v])=>{
            if(k.startsWith("chelahq_"))localStorage.setItem(k,v);
          });
          resolve({ok:true,msg:"Synced "+Object.keys(data.data).length+" items! Reloading in 2 seconds…"});
        }else{
          resolve({ok:false,msg:"Sync failed: "+JSON.stringify(data)});
        }
      };
      const s=document.createElement("script");
      s.src=this._url+"?action=getAll&callback="+cbName;
      s.onerror=()=>{
        clearTimeout(timeoutId);
        delete window[cbName];
        resolve({ok:false,msg:"Could not reach URL. Check it's correct and redeployed."});
      };
      document.head.appendChild(s);
    });
  }
};

// ── UTILS ─────────────────────────────────────────────
const uid=()=>Math.random().toString(36).slice(2,9);
const todayStr=()=>new Date().toISOString().slice(0,10);
const fmtDate=d=>{if(!d)return"—";const dt=new Date(d+"T12:00:00");return isNaN(dt)?d:dt.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});};
const fmtMoney=n=>"$"+Number(n||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const openSMS=body=>{window.location.href=`sms:${PHONE}?body=${encodeURIComponent(body)}`;};
const weekLabel=()=>{const d=new Date();const s=new Date(d);s.setDate(d.getDate()-d.getDay());const e=new Date(s);e.setDate(s.getDate()+6);return`${s.toLocaleDateString("en-US",{month:"short",day:"numeric"})} – ${e.toLocaleDateString("en-US",{month:"short",day:"numeric"})}`;};
const getDayAff=list=>list&&list.length?list[new Date().getDay()%list.length]:"";

// ── SHARED UI ─────────────────────────────────────────
const Sparkle=({size=14,color=C.pinkMed})=>(
  <svg width={size} height={size} viewBox="0 0 24 24" fill={color} style={{flexShrink:0,display:"inline-block"}}>
    <path d="M12 2l2 8 8 2-8 2-2 8-2-8-8-2 8-2z"/>
  </svg>
);

const Btn=({children,onClick,color=C.pinkMed,sm=false,outline=false,style={}})=>(
  <button onClick={onClick} style={{background:outline?"transparent":color,color:outline?color:"#fff",border:`2px solid ${color}`,borderRadius:20,padding:sm?"4px 12px":"8px 20px",fontSize:sm?11:13,fontWeight:800,cursor:"pointer",letterSpacing:"0.05em",textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",transition:"all 0.15s",whiteSpace:"nowrap",...style}}>{children}</button>
);

const Card=({children,style={},color=C.white})=>(
  <div style={{background:color,borderRadius:14,border:`1.5px solid rgba(0,0,0,0.07)`,padding:20,boxShadow:"0 2px 16px rgba(0,0,0,0.05)",...style}}>{children}</div>
);

const SecTitle=({children,color=C.pinkDeep,icon=true,style={}})=>(
  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:20,textTransform:"uppercase",letterSpacing:"0.07em",color,display:"flex",alignItems:"center",gap:7,marginBottom:14,...style}}>
    {icon&&<Sparkle color={color}/>}{children}
  </div>
);

const Lbl=({children,style={}})=>(
  <div style={{fontSize:10,fontWeight:800,letterSpacing:"0.18em",textTransform:"uppercase",color:C.gray,marginBottom:4,...style}}>{children}</div>
);

const Inp=({value,onChange,placeholder,type="text",style={}})=>(
  <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{border:`1.5px solid rgba(0,0,0,0.1)`,borderRadius:8,padding:"7px 11px",fontSize:13,outline:"none",width:"100%",background:C.white,fontFamily:"inherit",boxSizing:"border-box",...style}}/>
);

const Sel=({value,onChange,options,style={}})=>(
  <select value={value} onChange={e=>onChange(e.target.value)} style={{border:`1.5px solid rgba(0,0,0,0.1)`,borderRadius:8,padding:"7px 10px",fontSize:13,outline:"none",background:C.white,fontFamily:"inherit",cursor:"pointer",width:"100%",boxSizing:"border-box",...style}}>
    <option value="">Select…</option>
    {options.map(o=><option key={o.v||o} value={o.v||o}>{o.l||o}</option>)}
  </select>
);

const Txta=({value,onChange,placeholder,rows=3,style={}})=>(
  <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows} style={{border:`1.5px solid rgba(0,0,0,0.1)`,borderRadius:8,padding:"8px 11px",fontSize:13,outline:"none",width:"100%",background:C.white,fontFamily:"inherit",resize:"vertical",boxSizing:"border-box",...style}}/>
);

const StatusTag=({status})=>(
  <span style={{background:STATUS_COLORS[status]||C.lgray,borderRadius:10,padding:"2px 9px",fontSize:11,fontWeight:700,color:C.charcoal,whiteSpace:"nowrap",letterSpacing:"0.04em"}}>{status}</span>
);

const ProgressBar=({val,max,color=C.pinkMed})=>{
  const pct=max>0?Math.min(100,Math.round((val/max)*100)):0;
  return <div style={{display:"flex",alignItems:"center",gap:10}}>
    <div style={{flex:1,height:8,background:C.lgray,borderRadius:4,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:color,borderRadius:4,transition:"width 0.4s"}}/></div>
    <span style={{fontSize:12,fontWeight:700,color,minWidth:36}}>{pct}%</span>
  </div>;
};

const Modal=({open,onClose,title,children,color=C.pinkMed})=>{
  if(!open)return null;
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={onClose}>
    <div style={{background:C.white,borderRadius:18,padding:32,width:"100%",maxWidth:560,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:22,textTransform:"uppercase",letterSpacing:"0.05em",color}}>{title}</div>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.gray,lineHeight:1}}>×</button>
      </div>
      {children}
    </div>
  </div>;
};

// ── HQ TAB ────────────────────────────────────────────
function HQTab({tasks,projects,goToTab}){
  const [quote,setQuote]=useState("I am the dream and the builder.");
  const [word,setWord]=useState({word:"",meaning:""});
  const [focus,setFocus]=useState(["","",""]);
  const [runway,setRunway]=useState(Object.fromEntries(RUNWAY_CATS.map(c=>[c,[]])));
  const [calUrl,setCalUrl]=useState("");
  const [calView,setCalView]=useState("WEEK");
  const [editQ,setEditQ]=useState(false);
  const [editW,setEditW]=useState(false);
  const [runwayItem,setRunwayItem]=useState({cat:"",text:""});
  const [inited,setInited]=useState(false);

  useEffect(()=>{
    setQuote(store.get("hq_quote","I am the dream and the builder."));
    setWord(store.get("hq_word",{word:"",meaning:""}));
    setFocus(store.get("hq_focus",["","",""]));
    setRunway(store.get("hq_runway",Object.fromEntries(RUNWAY_CATS.map(c=>[c,[]]))));
    setCalUrl(store.get("hq_calurl",""));
    setInited(true);
  },[]);

  useEffect(()=>{if(inited){store.set("hq_quote",quote);}},[quote,inited]);
  useEffect(()=>{if(inited){store.set("hq_word",word);}},[word,inited]);
  useEffect(()=>{if(inited){store.set("hq_focus",focus);}},[focus,inited]);
  useEffect(()=>{if(inited){store.set("hq_runway",runway);}},[runway,inited]);
  useEffect(()=>{if(inited){store.set("hq_calurl",calUrl);}},[calUrl,inited]);

  const dueToday=tasks.filter(t=>t.finishBy===todayStr()&&t.status!=="Done");
  const todayAff=getDayAff(DEFAULT_AFFIRMATIONS);
  const now=new Date();
  const timeStr=now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true});
  const dateStr=now.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});

  const addRunwayItem=()=>{
    if(!runwayItem.cat||!runwayItem.text.trim())return;
    const updated={...runway,[runwayItem.cat]:[...(runway[runwayItem.cat]||[]),{id:uid(),text:runwayItem.text,done:false}]};
    setRunway(updated);
    setRunwayItem({cat:"",text:""});
  };
  const toggleRunway=(cat,id)=>setRunway(r=>({...r,[cat]:r[cat].map(i=>i.id===id?{...i,done:!i.done}:i)}));
  const removeRunway=(cat,id)=>setRunway(r=>({...r,[cat]:(r[cat]||[]).filter(i=>i.id!==id)}));

  const briefingText=()=>{
    const f=focus.filter(Boolean);
    const d=dueToday.map(t=>`• ${t.task}`).join("\n");
    return `✦ Good morning, Chela! ✦\n\nToday's Focus:\n${f.map((g,i)=>`${i+1}. ${g}`).join("\n")}\n\n${d?`Due Today:\n${d}\n\n`:""}${todayAff}\n\n— CMA. HQ`;
  };

  const embedSrc=calUrl?`${calUrl.includes("?")?calUrl.split("&mode=")[0]:calUrl}&mode=${calView}&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=0&showCalendars=0&bgcolor=%23FDF8F5`:"";

  return <div style={{display:"flex",flexDirection:"column",gap:24}}>
    {/* Header */}
    <div style={{background:`linear-gradient(135deg,${C.pink} 0%,${C.lav} 100%)`,borderRadius:14,padding:"28px 32px",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:12,right:20,opacity:0.12}}><Sparkle size={80} color={C.white}/></div>
      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:13,letterSpacing:"0.2em",textTransform:"uppercase",color:C.pinkDeep,marginBottom:4}}>✦ Welcome back ✦</div>
      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:42,textTransform:"uppercase",letterSpacing:"-0.01em",color:C.charcoal,lineHeight:0.95}}>Chela HQ.</div>
      <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,color:"rgba(0,0,0,0.5)",marginTop:8}}>{dateStr} · {timeStr}</div>
    </div>

    {/* Quote + Word */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
      <Card color={C.pink}>
        <SecTitle color={C.pinkDeep} style={{marginBottom:10}}>Today's Inspiration</SecTitle>
        {editQ?<div style={{display:"flex",flexDirection:"column",gap:8}}><Txta value={quote} onChange={setQuote} rows={3}/><Btn sm color={C.pinkMed} onClick={()=>setEditQ(false)}>Save</Btn></div>
        :<div><div style={{fontFamily:"Georgia,serif",fontSize:17,fontStyle:"italic",color:C.charcoal,lineHeight:1.6,marginBottom:12}}>"{quote}"</div><Btn sm outline color={C.pinkDeep} onClick={()=>setEditQ(true)}>Edit Quote</Btn></div>}
      </Card>
      <Card color={C.lav}>
        <SecTitle color={C.lavDeep} style={{marginBottom:10}}>Word of the Day</SecTitle>
        {editW?<div style={{display:"flex",flexDirection:"column",gap:8}}><Inp value={word.word} onChange={v=>setWord({...word,word:v})} placeholder="Word"/><Inp value={word.meaning} onChange={v=>setWord({...word,meaning:v})} placeholder="Meaning or intention"/><Btn sm color={C.lavMed} onClick={()=>setEditW(false)}>Save</Btn></div>
        :<div><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:28,textTransform:"uppercase",color:C.lavDeep,marginBottom:6}}>{word.word||"Set your word…"}</div><div style={{fontSize:14,color:C.charcoal,lineHeight:1.5,marginBottom:12}}>{word.meaning||<span style={{color:C.gray,fontStyle:"italic"}}>Add a meaning or intention</span>}</div><Btn sm outline color={C.lavDeep} onClick={()=>setEditW(true)}>Edit</Btn></div>}
      </Card>
    </div>

    {/* Today's Focus */}
    <Card>
      <SecTitle color={C.pinkDeep} style={{marginBottom:16}}>Today's Focus <span style={{fontSize:13,fontWeight:400,letterSpacing:0,textTransform:"none",fontFamily:"inherit",color:C.gray}}>— your big three</span></SecTitle>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
        {focus.map((g,i)=>(
          <div key={i} style={{background:i===0?C.pink:i===1?C.lav:C.mint,borderRadius:12,padding:16,position:"relative"}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:32,color:"rgba(0,0,0,0.07)",position:"absolute",top:8,right:12,lineHeight:1}}>{i+1}</div>
            <Lbl style={{color:"rgba(0,0,0,0.4)",marginBottom:8}}>Goal {i+1}</Lbl>
            <textarea value={g} onChange={e=>{const nf=[...focus];nf[i]=e.target.value;setFocus(nf);}} placeholder={["Biggest goal today…","Second priority…","Third priority…"][i]} rows={3} style={{background:"rgba(255,255,255,0.6)",border:"1.5px solid rgba(0,0,0,0.08)",borderRadius:8,padding:"8px 10px",fontSize:13,width:"100%",resize:"none",outline:"none",fontFamily:"inherit",boxSizing:"border-box"}}/>
          </div>
        ))}
      </div>
    </Card>

    {/* Runway */}
    <Card>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <SecTitle color={C.pinkDeep} style={{marginBottom:0}}>This Week's Runway <span style={{fontSize:12,fontWeight:400,color:C.gray,textTransform:"none",letterSpacing:0,fontFamily:"inherit"}}>{weekLabel()}</span></SecTitle>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <Sel value={runwayItem.cat} onChange={v=>setRunwayItem({...runwayItem,cat:v})} options={RUNWAY_CATS} style={{width:200}}/>
          <Inp value={runwayItem.text} onChange={v=>setRunwayItem({...runwayItem,text:v})} placeholder="Add priority…" style={{width:200}}/>
          <Btn sm color={C.pinkMed} onClick={addRunwayItem}>+ Add</Btn>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
        {RUNWAY_CATS.map((cat,ci)=>{
          const cols=[C.pink,C.lav,C.mint,C.peach,C.yellow,C.blue];
          const col=cols[ci%cols.length];
          const items=runway[cat]||[];
          return <div key={cat} style={{background:col+"44",borderRadius:10,padding:14,borderTop:`3px solid ${col}`}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:14,textTransform:"uppercase",letterSpacing:"0.06em",color:C.charcoal,marginBottom:10}}>{cat}</div>
            {items.length===0&&<div style={{fontSize:12,color:C.gray,fontStyle:"italic"}}>No priorities yet</div>}
            {items.map(item=><div key={item.id} style={{display:"flex",alignItems:"flex-start",gap:6,marginBottom:6}}>
              <input type="checkbox" checked={item.done} onChange={()=>toggleRunway(cat,item.id)} style={{marginTop:3,flexShrink:0}}/>
              <span style={{fontSize:13,flex:1,color:item.done?"#aaa":C.charcoal,textDecoration:item.done?"line-through":"none",lineHeight:1.4}}>{item.text}</span>
              <button onClick={()=>removeRunway(cat,item.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#ccc",fontSize:14,lineHeight:1,padding:0,flexShrink:0}}>×</button>
            </div>)}
          </div>;
        })}
      </div>
    </Card>

    {/* Calendar */}
    <Card>
      <SecTitle color={C.pinkDeep} style={{marginBottom:12}}>Calendar</SecTitle>
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
        {["DAY","WEEK","MONTH"].map(v=><button key={v} onClick={()=>setCalView(v)} style={{padding:"6px 16px",borderRadius:20,border:`2px solid ${C.pinkMed}`,background:calView===v?C.pinkMed:"transparent",color:calView===v?"#fff":C.pinkMed,fontWeight:800,fontSize:11,letterSpacing:"0.1em",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase"}}>{v}</button>)}
        <div style={{flex:1,minWidth:200}}><Inp value={calUrl} onChange={setCalUrl} placeholder="Paste Google Calendar embed URL (src='' value)…" style={{fontSize:11}}/></div>
      </div>
      {embedSrc?<iframe src={embedSrc} style={{width:"100%",height:500,border:"none",borderRadius:10}} title="Google Calendar"/>
      :<div style={{background:C.lgray,borderRadius:10,padding:40,textAlign:"center"}}>
        <div style={{fontSize:13,color:C.gray,marginBottom:8}}>To embed your Google Calendar:</div>
        <div style={{fontSize:12,color:C.gray,lineHeight:1.7,maxWidth:480,margin:"0 auto"}}>Go to <strong>calendar.google.com</strong> → Settings → your calendar → "Integrate Calendar" → Copy the embed code URL (the <code>src=""</code> value) → Paste above.</div>
      </div>}
    </Card>

// ── TASKS TAB ─────────────────────────────────────────
function TasksTab({tasks,setTasks,projects,goToTab}){
  const [modal,setModal]=useState(false);
  const [editing,setEditing]=useState(null);
  const [filterArea,setFilterArea]=useState("");
  const [filterStatus,setFilterStatus]=useState("");
  const [form,setForm]=useState({task:"",status:"Not Started",area:"",finishBy:"",projectId:"",notes:""});

  const openNew=()=>{setForm({task:"",status:"Not Started",area:"",finishBy:"",projectId:"",notes:""});setEditing(null);setModal(true);};
  const openEdit=t=>{setForm({...t});setEditing(t.id);setModal(true);};
  const save=()=>{if(!form.task.trim())return;if(editing)setTasks(ts=>ts.map(t=>t.id===editing?{...t,...form}:t));else setTasks(ts=>[...ts,{...form,id:uid(),created:todayStr()}]);setModal(false);};
  const del=id=>setTasks(ts=>ts.filter(t=>t.id!==id));

  const filtered=tasks.filter(t=>{
    if(filterArea&&t.area!==filterArea)return false;
    if(filterStatus&&t.status!==filterStatus)return false;
    return true;
  });

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
      <SecTitle color={C.mintDeep}>Tasks for the Doll ✔</SecTitle>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <Sel value={filterArea} onChange={setFilterArea} options={[{v:"",l:"All Areas"},...AREAS]} style={{width:150}}/>
        <Sel value={filterStatus} onChange={setFilterStatus} options={[{v:"",l:"All Status"},...TASK_STATUSES]} style={{width:150}}/>
        <Btn color={C.mintMed} onClick={openNew}>+ New Task</Btn>
      </div>
    </div>
    <div style={{background:C.white,borderRadius:12,overflow:"hidden",border:`1.5px solid rgba(0,0,0,0.07)`}}>
      <div style={{display:"grid",gridTemplateColumns:"2fr 110px 130px 110px 130px 40px",background:C.mint,padding:"10px 16px",fontSize:11,fontWeight:800,letterSpacing:"0.12em",textTransform:"uppercase",color:C.mintDeep}}>
        <span>Task</span><span>Status</span><span>Area</span><span>Finish By</span><span>Project</span><span></span>
      </div>
      {filtered.length===0&&<div style={{padding:32,textAlign:"center",color:C.gray,fontStyle:"italic",fontSize:14}}>No tasks yet. The doll rests. ✦</div>}
      {filtered.map((t,i)=>{
        const proj=projects.find(p=>p.id===t.projectId);
        return <div key={t.id} style={{display:"grid",gridTemplateColumns:"2fr 110px 130px 110px 130px 40px",padding:"11px 16px",borderBottom:`1px solid ${C.lgray}`,background:i%2===0?C.white:"#F8FFFC",alignItems:"center",cursor:"pointer"}} onClick={()=>openEdit(t)}>
          <div style={{fontSize:13,color:t.status==="Done"?"#aaa":C.charcoal,textDecoration:t.status==="Done"?"line-through":"none",fontWeight:500,paddingRight:8}}>{t.task}</div>
          <StatusTag status={t.status}/>
          <span style={{fontSize:12,color:C.gray}}>{t.area||"—"}</span>
          <span style={{fontSize:12,color:t.finishBy&&t.finishBy<todayStr()&&t.status!=="Done"?"#E05050":C.gray}}>{fmtDate(t.finishBy)}</span>
          <span style={{fontSize:12,color:proj?C.mintDeep:C.gray,fontWeight:proj?700:400,cursor:proj?"pointer":"default"}} onClick={proj?e=>{e.stopPropagation();goToTab("projects");}:undefined}>{proj?proj.name:"—"}</span>
          <button onClick={e=>{e.stopPropagation();del(t.id);}} style={{background:"none",border:"none",cursor:"pointer",color:"#ddd",fontSize:16}}>×</button>
        </div>;
      })}
    </div>
    <div style={{display:"flex",gap:12,marginTop:16,flexWrap:"wrap"}}>
      {TASK_STATUSES.map(s=>{const n=tasks.filter(t=>t.status===s).length;return<div key={s} style={{background:STATUS_COLORS[s]||C.lgray,borderRadius:10,padding:"5px 12px",fontSize:12,fontWeight:700,color:C.charcoal}}>{s}: {n}</div>;})}
    </div>
    <Modal open={modal} onClose={()=>setModal(false)} title={editing?"Edit Task":"New Task"} color={C.mintMed}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div><Lbl>Task</Lbl><Inp value={form.task} onChange={v=>setForm({...form,task:v})} placeholder="What needs to get done?"/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><Lbl>Status</Lbl><Sel value={form.status} onChange={v=>setForm({...form,status:v})} options={TASK_STATUSES}/></div>
          <div><Lbl>Area</Lbl><Sel value={form.area} onChange={v=>setForm({...form,area:v})} options={AREAS}/></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><Lbl>Finish By</Lbl><Inp type="date" value={form.finishBy} onChange={v=>setForm({...form,finishBy:v})}/></div>
          <div><Lbl>Project</Lbl><Sel value={form.projectId} onChange={v=>setForm({...form,projectId:v})} options={[{v:"",l:"None"},...projects.map(p=>({v:p.id,l:p.name}))]}/></div>
        </div>
        <div><Lbl>Notes</Lbl><Txta value={form.notes} onChange={v=>setForm({...form,notes:v})} placeholder="Any details…" rows={2}/></div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>

function MoneyTab(){

  const [section,setSection]=useState("tracker");
  const [mModal,setMModal]=useState(false);
  const [sModal,setSModal]=useState(false);
  const [iModal,setIModal]=useState(false);
  const [mForm,setMForm]=useState({date:todayStr(),description:"",type:"Income",amount:"",category:""});
  const [sForm,setSForm]=useState({name:"",target:"",current:"",notes:""});
  const [iForm,setIForm]=useState({client:"",description:"",amount:"",dueDate:"",status:"Draft",notes:""});
  const [editId,setEditId]=useState(null);
  const [inited,setInited]=useState(false);

  useEffect(()=>{setMoney(store.get("money",[]));setSavings(store.get("savings",[]));setInvoices(store.get("invoices",[]));setInited(true);},[]);
  useEffect(()=>{if(inited){store.set("money",money);}},[money,inited]);
  useEffect(()=>{if(inited){store.set("savings",savings);}},[savings,inited]);
  useEffect(()=>{if(inited){store.set("invoices",invoices);}},[invoices,inited]);

  const totalInc=money.filter(e=>e.type==="Income").reduce((s,e)=>s+Number(e.amount||0),0);

  const saveMoney=()=>{if(!mForm.description||!mForm.amount)return;if(editId)setMoney(m=>m.map(e=>e.id===editId?{...e,...mForm}:e));else setMoney(m=>[{...mForm,id:uid()},...m]);setMModal(false);setEditId(null);};

        {["tracker","savings","invoices"].map(s=><button key={s} onClick={()=>setSection(s)} style={{padding:"7px 16px",borderRadius:20,border:`2px solid ${C.peachMed}`,background:section===s?C.peachMed:"transparent",color:section===s?"#fff":C.peachMed,fontWeight:800,fontSize:12,letterSpacing:"0.06em",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase"}}>{s}</button>)}

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><div><Lbl>Target ($)</Lbl><Inp type="number" value={sForm.target} onChange={v=>setSForm({...sForm,target:v})}/></div><div><Lbl>Current ($)</Lbl><Inp type="number" value={sForm.current} onChange={v=>setSForm({...sForm,current:v})}/></div></div>

        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}><Btn outline color={C.gray} sm onClick={()=>setSModal(false)}>Cancel</Btn><Btn color={C.peachMed} onClick={saveSavings}>{editId?"Save":"Add Goal"}</Btn></div>
      </div>
    </Modal>
    <Modal open={iModal} onClose={()=>setIModal(false)} title="Invoice" color={C.peachMed}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><div><Lbl>Client</Lbl><Inp value={iForm.client} onChange={v=>setIForm({...iForm,client:v})} placeholder="Client name"/></div><div><Lbl>Amount ($)</Lbl><Inp type="number" value={iForm.amount} onChange={v=>setIForm({...iForm,amount:v})}/></div></div>
        <div><Lbl>Description / Services</Lbl><Inp value={iForm.description} onChange={v=>setIForm({...iForm,description:v})} placeholder="What are you invoicing for?"/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><div><Lbl>Due Date</Lbl><Inp type="date" value={iForm.dueDate} onChange={v=>setIForm({...iForm,dueDate:v})}/></div><div><Lbl>Status</Lbl><Sel value={iForm.status} onChange={v=>setIForm({...iForm,status:v})} options={INV_STATUSES}/></div></div>
        <div><Lbl>Notes</Lbl><Txta value={iForm.notes} onChange={v=>setIForm({...iForm,notes:v})} rows={2}/></div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}><Btn outline color={C.gray} sm onClick={()=>setIModal(false)}>Cancel</Btn><Btn color={C.peachMed} onClick={saveInvoice}>{editId?"Save":"Create"}</Btn></div>
      </div>
    </Modal>
  </div>;
}

function ResetTab(){
  const [view,setView]=useState("weekly");
  const [weeklyResets,setWR]=useState([]);
  const [monthlyResets,setMR]=useState([]);
  const [wAudits,setWA]=useState([]);
  const [mAudits,setMA]=useState([]);
  const [wForm,setWF]=useState({weekOf:todayStr(),wins:"",improve:"",gratitude:"",nextFocus:"",rating:5});
  const [mForm,setMF]=useState({month:new Date().getMonth()+1,year:new Date().getFullYear(),bigWins:"",challenges:"",lessons:"",nextGoals:"",rating:5});
  const [wChecks,setWC]=useState({});   // {catIdx_itemIdx: bool}
  const [mChecks,setMC]=useState({});
  const [wAuditNote,setWAN]=useState("");
  const [mAuditNote,setMAN]=useState("");
  const [inited,setInited]=useState(false);
  const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];

  useEffect(()=>{
    setWR(store.get("resets_weekly",[]));
    setMR(store.get("resets_monthly",[]));
    setWA(store.get("audits_weekly",[]));
    setMA(store.get("audits_monthly",[]));
    setWC(store.get("audit_wchecks",{}));
    setMC(store.get("audit_mchecks",{}));
    setInited(true);
  },[]);
  useEffect(()=>{if(inited){store.set("resets_weekly",weeklyResets);}},[weeklyResets,inited]);
  useEffect(()=>{if(inited){store.set("resets_monthly",monthlyResets);}},[monthlyResets,inited]);
  useEffect(()=>{if(inited){store.set("audits_weekly",wAudits);}},[wAudits,inited]);
  useEffect(()=>{if(inited){store.set("audits_monthly",mAudits);}},[mAudits,inited]);
  useEffect(()=>{if(inited){store.set("audit_wchecks",wChecks);}},[wChecks,inited]);
  useEffect(()=>{if(inited){store.set("audit_mchecks",mChecks);}},[mChecks,inited]);

  const saveWeekly=()=>{setWR(r=>[{...wForm,id:uid(),created:todayStr()},...r]);setWF({weekOf:todayStr(),wins:"",improve:"",gratitude:"",nextFocus:"",rating:5});};
  const saveMonthly=()=>{setMR(r=>[{...mForm,id:uid(),created:todayStr()},...r]);setMF({month:new Date().getMonth()+1,year:new Date().getFullYear(),bigWins:"",challenges:"",lessons:"",nextGoals:"",rating:5});};

  const saveWeeklyAudit=()=>{
    const total=WEEKLY_AUDIT.reduce((s,c)=>s+c.items.length,0);
    const done=Object.values(wChecks).filter(Boolean).length;
    setWA(a=>[{id:uid(),date:todayStr(),checks:{...wChecks},note:wAuditNote,total,done},...a]);
    setWC({});setWAN("");
  };
  const saveMonthlyAudit=()=>{
    const total=MONTHLY_AUDIT.reduce((s,c)=>s+c.items.length,0);
    const done=Object.values(mChecks).filter(Boolean).length;
    setMA(a=>[{id:uid(),date:todayStr(),checks:{...mChecks},note:mAuditNote,total,done},...a]);
    setMC({});setMAN("");
  };

  const wTotal=WEEKLY_AUDIT.reduce((s,c)=>s+c.items.length,0);
  const wDone=Object.values(wChecks).filter(Boolean).length;
  const mTotal=MONTHLY_AUDIT.reduce((s,c)=>s+c.items.length,0);
  const mDone=Object.values(mChecks).filter(Boolean).length;

  const CAT_COLORS=[C.pink,C.lav,C.mint,C.peach,C.yellow,C.blue,C.rose,C.lilac,C.mint];

  const AuditChecklist=({items:ITEMS,checks,setChecks,note,setNote,total,done,onSave,accentColor})=>(
    <div>
      {/* Progress bar */}
      <div style={{background:C.white,borderRadius:12,padding:"16px 20px",marginBottom:20,border:`1.5px solid rgba(0,0,0,0.07)`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:16,textTransform:"uppercase",letterSpacing:"0.06em",color:accentColor}}>Progress: {done}/{total} complete</div>
          <div style={{fontSize:13,fontWeight:700,color:accentColor}}>{total>0?Math.round((done/total)*100):0}%</div>
        </div>
        <ProgressBar val={done} max={total} color={accentColor}/>
        <div style={{display:"flex",gap:10,marginTop:12,flexWrap:"wrap"}}>
          <button onClick={()=>setChecks(()=>{const all={};ITEMS.forEach((c,ci)=>c.items.forEach((_,ii)=>{all[`${ci}_${ii}`]=true;}));return all;})} style={{background:"none",border:`1.5px solid ${accentColor}`,borderRadius:16,padding:"4px 14px",fontSize:11,cursor:"pointer",color:accentColor,fontWeight:700}}>✓ Check All</button>
          <button onClick={()=>setChecks({})} style={{background:"none",border:`1.5px solid ${C.lgray}`,borderRadius:16,padding:"4px 14px",fontSize:11,cursor:"pointer",color:C.gray,fontWeight:700}}>↺ Clear All</button>
        </div>
      </div>

      {/* Checklist by category */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",gap:14,marginBottom:20}}>
        {ITEMS.map((cat,ci)=>{
          const catDone=cat.items.filter((_,ii)=>checks[`${ci}_${ii}`]).length;
          const col=CAT_COLORS[ci%CAT_COLORS.length];
          return <div key={ci} style={{background:col+"44",borderRadius:12,padding:16,borderTop:`3px solid ${col}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:14,textTransform:"uppercase",letterSpacing:"0.05em",color:C.charcoal}}>{cat.cat}</div>
              <span style={{background:catDone===cat.items.length?C.mint:col,borderRadius:10,padding:"2px 10px",fontSize:11,fontWeight:700,color:C.charcoal}}>{catDone}/{cat.items.length}</span>
            </div>
            {cat.items.map((item,ii)=>{
              const key=`${ci}_${ii}`;
              return <label key={ii} style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:8,cursor:"pointer"}}>
                <input type="checkbox" checked={!!checks[key]} onChange={e=>setChecks(prev=>({...prev,[key]:e.target.checked}))} style={{marginTop:3,flexShrink:0,accentColor:accentColor}}/>
                <span style={{fontSize:13,color:checks[key]?"#aaa":C.charcoal,textDecoration:checks[key]?"line-through":"none",lineHeight:1.5}}>{item}</span>
              </label>;
            })}
          </div>;
        })}
      </div>

      {/* Save audit */}
      <Card style={{borderTop:`3px solid ${accentColor}`}}>
        <Lbl style={{marginBottom:8}}>Notes for this audit (optional)</Lbl>
        <Txta value={note} onChange={setNote} placeholder="Anything to flag, decide, or follow up on from this audit…" rows={3}/>
        <div style={{marginTop:14,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <Btn color={accentColor} style={{color:accentColor===C.yellowMed?"#1A1A1A":"#fff"}} onClick={onSave}>Save Audit ({done}/{total} done) ↻</Btn>
          <span style={{fontSize:12,color:C.gray,fontStyle:"italic"}}>Saves a snapshot of your completion to Audit History</span>
        </div>
      </Card>
    </div>
  );

  const views=[
    {id:"weekly-audit",label:"Weekly Audit"},
    {id:"weekly",label:"Weekly Reset"},
    {id:"monthly-audit",label:"Monthly Audit"},
    {id:"monthly",label:"Monthly Reset"},
    {id:"history",label:"History"},
  ];

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
      <SecTitle color={C.yellowMed}>Reset Studio ↻</SecTitle>
      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
        {views.map(v=><button key={v.id} onClick={()=>setView(v.id)} style={{padding:"7px 14px",borderRadius:20,border:`2px solid ${C.yellowMed}`,background:view===v.id?C.yellowMed:"transparent",color:view===v.id?"#fff":C.yellowMed,fontWeight:800,fontSize:11,letterSpacing:"0.05em",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase"}}>{v.label}</button>)}
      </div>
    </div>

    {view==="weekly-audit"&&<div>
      <div style={{background:`linear-gradient(135deg,${C.yellow},${C.peach})`,borderRadius:12,padding:"20px 24px",marginBottom:24}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:22,textTransform:"uppercase",letterSpacing:"0.05em",color:C.charcoal,marginBottom:4}}>Weekly Audit Checklist</div>
        <div style={{fontSize:13,color:"rgba(0,0,0,0.6)",lineHeight:1.6}}>Run this every week — ideally Friday or Sunday. Get your house in order across every area of your life and business before the next week begins.</div>
      </div>
      <AuditChecklist items={WEEKLY_AUDIT} checks={wChecks} setChecks={setWC} note={wAuditNote} setNote={setWAN} total={wTotal} done={wDone} onSave={saveWeeklyAudit} accentColor={C.yellowMed}/>
    </div>}

    {view==="weekly"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
      <Card>
        <SecTitle color={C.yellowMed} style={{marginBottom:16}}>Weekly Reset</SecTitle>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div><Lbl>Week of</Lbl><Inp type="date" value={wForm.weekOf} onChange={v=>setWF({...wForm,weekOf:v})}/></div>
          <div><Lbl>✦ Top Wins This Week</Lbl><Txta value={wForm.wins} onChange={v=>setWF({...wForm,wins:v})} placeholder="What went right? What did you accomplish?" rows={3}/></div>
          <div><Lbl>↑ What to Improve</Lbl><Txta value={wForm.improve} onChange={v=>setWF({...wForm,improve:v})} placeholder="What would you do differently?" rows={3}/></div>
          <div><Lbl>♡ Gratitude</Lbl><Txta value={wForm.gratitude} onChange={v=>setWF({...wForm,gratitude:v})} placeholder="What are you grateful for this week?" rows={2}/></div>
          <div><Lbl>→ Next Week's Focus</Lbl><Txta value={wForm.nextFocus} onChange={v=>setWF({...wForm,nextFocus:v})} placeholder="What are you committing to next week?" rows={2}/></div>
          <div><Lbl>Rating (1–10): <strong style={{color:C.yellowMed}}>{wForm.rating}</strong></Lbl><input type="range" min={1} max={10} value={wForm.rating} onChange={e=>setWF({...wForm,rating:Number(e.target.value)})}/></div>
          <Btn color={C.yellowMed} style={{color:C.charcoal}} onClick={saveWeekly}>Save Weekly Reset ↻</Btn>
        </div>
      </Card>
      <div>
        <SecTitle color={C.yellowMed} style={{fontSize:17,marginBottom:14}}>Recent Resets</SecTitle>
        {weeklyResets.length===0&&<div style={{fontSize:13,color:C.gray,fontStyle:"italic"}}>No weekly resets saved yet.</div>}
        {weeklyResets.slice(0,5).map(r=><Card key={r.id} style={{marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <div style={{fontWeight:700,fontSize:14}}>Week of {fmtDate(r.weekOf)}</div>
            <div style={{background:C.yellow,borderRadius:10,padding:"2px 10px",fontSize:12,fontWeight:700,color:C.charcoal}}>{r.rating}/10</div>
          </div>
          {r.wins&&<div style={{fontSize:12,color:C.gray,lineHeight:1.5,marginBottom:4}}><strong>Wins:</strong> {r.wins.slice(0,120)}{r.wins.length>120?"…":""}</div>}
          {r.nextFocus&&<div style={{fontSize:12,color:C.gray,lineHeight:1.5}}><strong>Next week:</strong> {r.nextFocus.slice(0,100)}{r.nextFocus.length>100?"…":""}</div>}
        </Card>)}
      </div>
    </div>}

    {view==="monthly-audit"&&<div>
      <div style={{background:`linear-gradient(135deg,${C.lav},${C.pink})`,borderRadius:12,padding:"20px 24px",marginBottom:24}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:22,textTransform:"uppercase",letterSpacing:"0.05em",color:C.charcoal,marginBottom:4}}>Monthly Audit Checklist</div>
        <div style={{fontSize:13,color:"rgba(0,0,0,0.6)",lineHeight:1.6}}>Run this at the end of every month. This is your full business and life audit — admin, finance, brand, social, gallery, C DOT, and personal growth all in one place.</div>
      </div>
      <AuditChecklist items={MONTHLY_AUDIT} checks={mChecks} setChecks={setMC} note={mAuditNote} setNote={setMAN} total={mTotal} done={mDone} onSave={saveMonthlyAudit} accentColor={C.lavDeep}/>
    </div>}

    {view==="monthly"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
      <Card>
        <SecTitle color={C.yellowMed} style={{marginBottom:16}}>Monthly Reset</SecTitle>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><Lbl>Month</Lbl><Sel value={mForm.month} onChange={v=>setMF({...mForm,month:Number(v)})} options={MONTHS.map((m,i)=>({v:i+1,l:m}))}/></div>
            <div><Lbl>Year</Lbl><Inp type="number" value={mForm.year} onChange={v=>setMF({...mForm,year:Number(v)})}/></div>
          </div>
          <div><Lbl>✦ Big Wins This Month</Lbl><Txta value={mForm.bigWins} onChange={v=>setMF({...mForm,bigWins:v})} placeholder="Major accomplishments, milestones…" rows={3}/></div>
          <div><Lbl>↗ Challenges Faced</Lbl><Txta value={mForm.challenges} onChange={v=>setMF({...mForm,challenges:v})} placeholder="What was hard? What tested you?" rows={3}/></div>
          <div><Lbl>✎ Lessons Learned</Lbl><Txta value={mForm.lessons} onChange={v=>setMF({...mForm,lessons:v})} placeholder="What did this month teach you?" rows={2}/></div>
          <div><Lbl>→ Next Month's Goals</Lbl><Txta value={mForm.nextGoals} onChange={v=>setMF({...mForm,nextGoals:v})} placeholder="What are you committing to?" rows={2}/></div>
          <div><Lbl>Month Rating (1–10): <strong style={{color:C.yellowMed}}>{mForm.rating}</strong></Lbl><input type="range" min={1} max={10} value={mForm.rating} onChange={e=>setMF({...mForm,rating:Number(e.target.value)})}/></div>
          <Btn color={C.yellowMed} style={{color:C.charcoal}} onClick={saveMonthly}>Save Monthly Reset ↻</Btn>
        </div>
      </Card>
      <Card>
        <SecTitle color={C.yellowMed} style={{fontSize:17,marginBottom:14}}>Monthly History</SecTitle>
        {monthlyResets.length===0&&<div style={{fontSize:13,color:C.gray,fontStyle:"italic"}}>No monthly resets yet.</div>}
        {monthlyResets.slice(0,5).map(r=><div key={r.id} style={{borderBottom:`1px solid ${C.lgray}`,paddingBottom:12,marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <div style={{fontWeight:700,fontSize:14}}>{MONTHS[r.month-1]} {r.year}</div>
            <div style={{background:C.yellow,borderRadius:10,padding:"2px 10px",fontSize:12,fontWeight:700,color:C.charcoal}}>{r.rating}/10</div>
          </div>
          {r.bigWins&&<div style={{fontSize:12,color:C.gray,lineHeight:1.5}}><strong>Wins:</strong> {r.bigWins.slice(0,120)}{r.bigWins.length>120?"…":""}</div>}
        </div>)}
      </Card>

          {monthlyResets.map(r=><Card key={r.id} style={{marginBottom:12}}>

              <div style={{fontWeight:700}}>{"Jan Feb Mar Apr May Jun Jul Aug Sep Oct Nov Dec".split(" ")[r.month-1]} {r.year}</div>

    </div>}
  </div>;
}

function BizOpsTab(){
  const [data,setData]=useState({});
  const [inited,setInited]=useState(false);
  const [show,setShow]=useState({});
  const [adding,setAdding]=useState(null);
  const [newItem,setNewItem]=useState({k:"",v:""});

  useEffect(()=>{setData(store.get("bizops_data",{}));setInited(true);},[]);
  useEffect(()=>{if(inited){store.set("bizops_data",data);}},[data,inited]);

  const getItems=key=>data[key]||BIZ_SECTIONS.find(s=>s.key===key)?.items||[];
  const updateItem=(sKey,idx,field,val)=>{const items=[...getItems(sKey)];items[idx]={...items[idx],[field]:val};setData(d=>({...d,[sKey]:items}));};
  const addItem=sKey=>{if(!newItem.k.trim())return;const items=[...getItems(sKey),{k:newItem.k,v:newItem.v}];setData(d=>({...d,[sKey]:items}));setNewItem({k:"",v:""});setAdding(null);};
  const delItem=(sKey,idx)=>{const items=getItems(sKey).filter((_,i)=>i!==idx);setData(d=>({...d,[sKey]:items}));};
  const isSensitive=(sKey,k)=>sKey==="banking"||["EIN","Routing","Account","Password"].some(s=>k.includes(s));

  return <div>
    <SecTitle color={C.blueMed} style={{marginBottom:20}}>Biz Ops ⌘</SecTitle>
    <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:16}}>
      {BIZ_SECTIONS.map(sec=>{
        const items=getItems(sec.key);
        const isShowing=show[sec.key];
        return <Card key={sec.key}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:17,textTransform:"uppercase",letterSpacing:"0.06em",color:C.blueMed}}>{sec.emoji} {sec.label}</div>
            {isSensitive(sec.key,"")&&<button onClick={()=>setShow(s=>({...s,[sec.key]:!s[sec.key]}))} style={{background:C.blue,border:"none",borderRadius:10,padding:"3px 10px",fontSize:11,cursor:"pointer",color:C.blueDeep,fontWeight:700}}>{isShowing?"🙈 Hide":"👁 Show"}</button>}
          </div>
          {items.map((item,idx)=><div key={idx} style={{display:"grid",gridTemplateColumns:"120px 1fr 28px",gap:8,marginBottom:8,alignItems:"center"}}>
            <Lbl style={{marginBottom:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.k}</Lbl>
            <input type={(isSensitive(sec.key,item.k)&&!isShowing)?"password":"text"} value={item.v} onChange={e=>updateItem(sec.key,idx,"v",e.target.value)} placeholder="—" style={{border:"1.5px solid rgba(0,0,0,0.08)",borderRadius:6,padding:"5px 8px",fontSize:13,outline:"none",width:"100%",boxSizing:"border-box",fontFamily:"inherit"}}/>
            <button onClick={()=>delItem(sec.key,idx)} style={{background:"none",border:"none",cursor:"pointer",color:"#ddd",fontSize:14}}>×</button>
          </div>)}
          {adding===sec.key?<div style={{display:"flex",gap:6,marginTop:10}}><Inp value={newItem.k} onChange={v=>setNewItem({...newItem,k:v})} placeholder="Field" style={{flex:"0 0 110px"}}/><Inp value={newItem.v} onChange={v=>setNewItem({...newItem,v:v})} placeholder="Value"/><Btn sm color={C.blueMed} onClick={()=>addItem(sec.key)}>Add</Btn><Btn sm outline color={C.gray} onClick={()=>setAdding(null)}>✕</Btn></div>
          :<button onClick={()=>setAdding(sec.key)} style={{background:"none",border:`1.5px dashed ${C.blueMed}`,borderRadius:8,padding:"5px 12px",fontSize:12,cursor:"pointer",color:C.blueMed,marginTop:8,fontWeight:700}}>+ Add Field</button>}
        </Card>;
      })}
    </div>
  </div>;
}

          <div><Lbl>Date</Lbl><Inp type="date" value={aForm.date} onChange={v=>setAF({...aForm,date:v})}/></div>
          <div><Lbl>Notes</Lbl><Inp value={aForm.notes} onChange={v=>setAF({...aForm,notes:v})} placeholder="Location, notes…"/></div>
          <Btn color={C.lilacMed} onClick={saveAppt}>Add</Btn>
        </div>
      </Card>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:12}}>
        {appts.length===0&&<div style={{color:C.gray,fontStyle:"italic",fontSize:13,gridColumn:"1/-1",padding:20,textAlign:"center"}}>No appointments tracked yet. Your health is your wealth.</div>}
        {appts.sort((a,b)=>(a.date||"").localeCompare(b.date||"")).map(a=>{const isPast=a.date&&a.date<todayStr();return<div key={a.id} style={{background:isPast?C.lgray:C.lilac,borderRadius:12,padding:16,opacity:isPast?0.6:1}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><div style={{fontWeight:700,fontSize:15}}>{a.type}</div><button onClick={()=>setAppts(x=>x.filter(y=>y.id!==a.id))} style={{background:"none",border:"none",cursor:"pointer",color:"#ccc",fontSize:14}}>×</button></div><div style={{fontSize:13,color:C.charcoal,marginBottom:4}}>{a.provider}</div><div style={{fontSize:12,color:C.lilacMed,fontWeight:700}}>{fmtDate(a.date)}</div>{a.notes&&<div style={{fontSize:12,color:C.gray,marginTop:6}}>{a.notes}</div>}</div>;})}
      </div>
    </div>}

    {section==="gym"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
      <Card color={C.lilac}>
        <SecTitle color={C.lilacMed} style={{marginBottom:14}}>Log Workout 💪</SecTitle>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div><Lbl>Date</Lbl><Inp type="date" value={gForm.date} onChange={v=>setGF({...gForm,date:v})}/></div>
          <div><Lbl>Activity</Lbl><Sel value={gForm.activity} onChange={v=>setGF({...gForm,activity:v})} options={["Gym / Weights","Cardio","Pilates","Yoga","Walk","Run","Dance","Home Workout","Other"]}/></div>
          <div><Lbl>Duration</Lbl><Inp value={gForm.duration} onChange={v=>setGF({...gForm,duration:v})} placeholder="e.g. 45 min"/></div>
          <div><Lbl>Notes</Lbl><Txta value={gForm.notes} onChange={v=>setGF({...gForm,notes:v})} rows={2} placeholder="How did you feel?"/></div>
          <Btn color={C.lilacMed} onClick={saveGym}>Log It 💪</Btn>
        </div>
      </Card>
      <div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
          <Card style={{textAlign:"center"}}><Lbl style={{marginBottom:6}}>This Week</Lbl><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:36,color:C.lilacMed}}>{gymWeekTotal}</div><div style={{fontSize:12,color:C.gray}}>sessions</div></Card>
          <Card style={{textAlign:"center"}}><Lbl style={{marginBottom:6}}>All Time</Lbl><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:36,color:C.lilacMed}}>{gym.length}</div><div style={{fontSize:12,color:C.gray}}>logged</div></Card>
        </div>
        <SecTitle color={C.lilacMed} style={{fontSize:16,marginBottom:10}}>Recent Sessions</SecTitle>
        {gym.slice(0,5).map(g=><div key={g.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${C.lgray}`}}><div><div style={{fontSize:14,fontWeight:700,color:C.charcoal}}>{g.activity}</div>{g.notes&&<div style={{fontSize:12,color:C.gray}}>{g.notes}</div>}</div><div style={{textAlign:"right"}}><div style={{fontSize:12,color:C.gray}}>{fmtDate(g.date)}</div>{g.duration&&<div style={{fontSize:12,color:C.lilacMed,fontWeight:700}}>{g.duration}</div>}</div></div>)}
      </div>
    </div>}

    {section==="affirmations"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
      <div>
        <Card color={C.charcoal} style={{marginBottom:16}}>
          <div style={{fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",color:"rgba(255,255,255,0.4)",marginBottom:12}}>Today's Affirmation · Day {new Date().getDay()+1}</div>
          <div style={{fontFamily:"Georgia,serif",fontSize:18,fontStyle:"italic",color:C.pink,lineHeight:1.7,marginBottom:16}}>"{todayAff}"</div>
          <Btn color={C.pinkMed} onClick={()=>openSMS(affMsg)}>📱 Send to Myself</Btn>
        </Card>
        <Card>
          <SecTitle color={C.lilacMed} style={{marginBottom:14}}>Add Affirmation</SecTitle>
          <div style={{display:"flex",gap:8}}><Txta value={newAff} onChange={setNewAff} placeholder="Write your affirmation…" rows={2} style={{flex:1}}/><Btn color={C.lilacMed} style={{alignSelf:"flex-end"}} onClick={()=>{if(!newAff.trim())return;setAffList(a=>[...a,newAff.trim()]);setNewAff("");}}>+</Btn></div>
        </Card>
      </div>
      <div>
        <SecTitle color={C.lilacMed} style={{marginBottom:14}}>Your Affirmations ({affList.length})</SecTitle>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {affList.map((a,i)=><div key={i} style={{background:i%2===0?C.lilac+"66":C.pink+"33",borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:11,fontWeight:800,color:C.lilacMed,minWidth:20}}>{i+1}</span>
            <span style={{flex:1,fontSize:13,color:C.charcoal,fontStyle:"italic",lineHeight:1.5}}>{a}</span>
            <button onClick={()=>setAffList(al=>al.filter((_,j)=>j!==i))} style={{background:"none",border:"none",cursor:"pointer",color:"#ccc",fontSize:14,flexShrink:0}}>×</button>
          </div>)}
        </div>
      </div>
    </div>}
  </div>;
}


// ── CONTENT CALENDAR ──────────────────────────────────
const PLATFORMS=["IG","TikTok","Facebook Reels","Substack","YouTube"];
const PILLARS=["Gallery Life","Art + Culture","DC Scene","Creative Biz","C DOT.","Personal Brand","Behind the Scenes","Other"];
const CONTENT_STATUSES=["Idea","Scripted","Filmed","Edited","Scheduled","Posted"];
const CONTENT_STATUS_COLORS={
  "Idea":C.lgray,"Scripted":C.lav,"Filmed":C.peach,"Edited":C.yellow,"Scheduled":C.blue,"Posted":C.mint
};
const PLATFORM_COLORS={"IG":C.pinkMed,"TikTok":"#444","Facebook Reels":C.blueMed,"Substack":C.yellowMed,"YouTube":"#CC3333"};

function ContentTab(){
  const [posts,setPosts]=useState([]);
  const [view,setView]=useState("list");
  const [modal,setModal]=useState(false);
  const [editing,setEditing]=useState(null);
  const [filterPlatform,setFP]=useState("");
  const [filterStatus,setFS]=useState("");
  const [filterPillar,setFPL]=useState("");
  const [weekOffset,setWO]=useState(0);
  const [form,setForm]=useState({title:"",platform:"IG",pillar:"",status:"Idea",caption:"",postDate:"",notes:""});
  const [inited,setInited]=useState(false);

  useEffect(()=>{setPosts(store.get("content_posts",[]));setInited(true);},[]);
  useEffect(()=>{if(inited){store.set("content_posts",posts);}},[posts,inited]);

  const openNew=()=>{setForm({title:"",platform:"IG",pillar:"",status:"Idea",caption:"",postDate:todayStr(),notes:""});setEditing(null);setModal(true);};
  const openEdit=p=>{setForm({...p});setEditing(p.id);setModal(true);};
  const save=()=>{
    if(!form.title.trim())return;
    if(editing)setPosts(ps=>ps.map(p=>p.id===editing?{...p,...form}:p));
    else setPosts(ps=>[...ps,{...form,id:uid(),created:todayStr()}]);
    setModal(false);
  };
  const del=id=>setPosts(ps=>ps.filter(p=>p.id!==id));
  const quickStatus=(id,status)=>setPosts(ps=>ps.map(p=>p.id===id?{...p,status}:p));

  const filtered=posts.filter(p=>{
    if(filterPlatform&&p.platform!==filterPlatform)return false;
    if(filterStatus&&p.status!==filterStatus)return false;
    if(filterPillar&&p.pillar!==filterPillar)return false;
    return true;
  });

  // Weekly grid helpers
  const getWeekDays=()=>{
    const now=new Date();
    const startOfWeek=new Date(now);
    startOfWeek.setDate(now.getDate()-now.getDay()+(weekOffset*7));
    return Array.from({length:7},(_,i)=>{
      const d=new Date(startOfWeek);
      d.setDate(startOfWeek.getDate()+i);
      return d;
    });
  };
  const weekDays=getWeekDays();
  const weekStart=weekDays[0];
  const weekEnd=weekDays[6];
  const weekLabel2=`${weekStart.toLocaleDateString("en-US",{month:"short",day:"numeric"})} – ${weekEnd.toLocaleDateString("en-US",{month:"short",day:"numeric"})}`;
  const getPostsForDay=d=>{
    const ds=d.toISOString().slice(0,10);
    return posts.filter(p=>p.postDate===ds);
  };

  const DAY_NAMES=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  // Stats
  const postedThisWeek=posts.filter(p=>{
    if(p.status!=="Posted"||!p.postDate)return false;
    const d=new Date(p.postDate+"T12:00:00");
    return d>=weekDays[0]&&d<=weekDays[6];
  }).length;
  const scheduled=posts.filter(p=>p.status==="Scheduled").length;
  const ideas=posts.filter(p=>p.status==="Idea").length;

  return <div>
    {/* Header */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
      <SecTitle color={C.roseMed}>Content Calendar 📲</SecTitle>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        <button onClick={()=>setView("list")} style={{padding:"7px 16px",borderRadius:20,border:`2px solid ${C.roseMed}`,background:view==="list"?C.roseMed:"transparent",color:view==="list"?"#fff":C.roseMed,fontWeight:800,fontSize:11,letterSpacing:"0.06em",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase"}}>List</button>
        <button onClick={()=>setView("week")} style={{padding:"7px 16px",borderRadius:20,border:`2px solid ${C.roseMed}`,background:view==="week"?C.roseMed:"transparent",color:view==="week"?"#fff":C.roseMed,fontWeight:800,fontSize:11,letterSpacing:"0.06em",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase"}}>Week</button>
        <Btn color={C.roseMed} onClick={openNew}>+ New Post</Btn>
      </div>
    </div>

    {/* Stats row */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
      {[
        {l:"Total Posts",v:posts.length,c:C.rose,tc:C.roseMed},
        {l:"Ideas",v:ideas,c:C.lgray,tc:C.gray},
        {l:"Scheduled",v:scheduled,c:C.blue,tc:C.blueMed},
        {l:"Posted This Week",v:postedThisWeek,c:C.mint,tc:C.mintDeep},
      ].map(({l,v,c,tc})=><Card key={l} color={c} style={{textAlign:"center",padding:"14px 10px"}}>
        <Lbl style={{color:tc,marginBottom:4}}>{l}</Lbl>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:28,color:tc}}>{v}</div>
      </Card>)}
    </div>

    {/* Platform breakdown */}
    <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
      {PLATFORMS.map(p=>{
        const n=posts.filter(x=>x.platform===p).length;
        return <div key={p} style={{background:PLATFORM_COLORS[p]||C.gray,borderRadius:10,padding:"5px 14px",fontSize:12,fontWeight:700,color:"#fff",opacity:n===0?0.35:1}}>{p}: {n}</div>;
      })}
    </div>

    {/* LIST VIEW */}
    {view==="list"&&<div>
      {/* Filters */}
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        <Sel value={filterPlatform} onChange={setFP} options={[{v:"",l:"All Platforms"},...PLATFORMS]} style={{width:160}}/>
        <Sel value={filterStatus} onChange={setFS} options={[{v:"",l:"All Status"},...CONTENT_STATUSES]} style={{width:150}}/>
        <Sel value={filterPillar} onChange={setFPL} options={[{v:"",l:"All Pillars"},...PILLARS]} style={{width:180}}/>
      </div>

      <div style={{background:C.white,borderRadius:12,overflow:"hidden",border:`1.5px solid rgba(0,0,0,0.07)`}}>
        <div style={{display:"grid",gridTemplateColumns:"2fr 90px 120px 110px 110px 40px",background:C.rose,padding:"10px 16px",fontSize:11,fontWeight:800,letterSpacing:"0.12em",textTransform:"uppercase",color:C.roseMed}}>
          <span>Title / Caption</span><span>Platform</span><span>Pillar</span><span>Status</span><span>Post Date</span><span></span>
        </div>
        {filtered.length===0&&<div style={{padding:32,textAlign:"center",color:C.gray,fontStyle:"italic",fontSize:14}}>No content yet. Every empire starts with one post. 📲</div>}
        {filtered.sort((a,b)=>(a.postDate||"9999").localeCompare(b.postDate||"9999")).map((p,i)=><div key={p.id} style={{display:"grid",gridTemplateColumns:"2fr 90px 120px 110px 110px 40px",padding:"11px 16px",borderBottom:`1px solid ${C.lgray}`,background:i%2===0?C.white:"#FFF8FA",alignItems:"center",cursor:"pointer"}} onClick={()=>openEdit(p)}>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:p.status==="Posted"?"#aaa":C.charcoal,textDecoration:p.status==="Posted"?"line-through":"none",marginBottom:2}}>{p.title}</div>
            {p.caption&&<div style={{fontSize:11,color:C.gray,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:300}}>{p.caption}</div>}
          </div>
          <span style={{display:"inline-block",background:PLATFORM_COLORS[p.platform]||C.gray,borderRadius:10,padding:"2px 8px",fontSize:10,fontWeight:700,color:"#fff",whiteSpace:"nowrap"}}>{p.platform}</span>
          <span style={{fontSize:11,color:C.gray}}>{p.pillar||"—"}</span>
          <div onClick={e=>e.stopPropagation()}>
            <select value={p.status} onChange={e=>quickStatus(p.id,e.target.value)} style={{background:CONTENT_STATUS_COLORS[p.status]||C.lgray,border:"none",borderRadius:10,padding:"3px 8px",fontSize:11,fontWeight:700,cursor:"pointer",color:C.charcoal,outline:"none",fontFamily:"inherit"}}>
              {CONTENT_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          <span style={{fontSize:12,color:C.gray}}>{fmtDate(p.postDate)}</span>
          <button onClick={e=>{e.stopPropagation();del(p.id);}} style={{background:"none",border:"none",cursor:"pointer",color:"#ddd",fontSize:16}}>×</button>
        </div>)}
      </div>

      {/* Status summary */}
      <div style={{display:"flex",gap:10,marginTop:14,flexWrap:"wrap"}}>
        {CONTENT_STATUSES.map(s=>{const n=posts.filter(p=>p.status===s).length;return<div key={s} style={{background:CONTENT_STATUS_COLORS[s]||C.lgray,borderRadius:10,padding:"4px 12px",fontSize:11,fontWeight:700,color:C.charcoal}}>{s}: {n}</div>;})}
      </div>
    </div>}

    {/* WEEKLY GRID VIEW */}
    {view==="week"&&<div>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16}}>
        <button onClick={()=>setWO(o=>o-1)} style={{background:C.rose,border:"none",borderRadius:20,padding:"6px 14px",cursor:"pointer",fontWeight:800,fontSize:14,color:C.roseMed}}>←</button>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:18,textTransform:"uppercase",letterSpacing:"0.05em",color:C.charcoal}}>{weekLabel2}</div>
        <button onClick={()=>setWO(o=>o+1)} style={{background:C.rose,border:"none",borderRadius:20,padding:"6px 14px",cursor:"pointer",fontWeight:800,fontSize:14,color:C.roseMed}}>→</button>
        <button onClick={()=>setWO(0)} style={{background:"none",border:`1.5px solid ${C.roseMed}`,borderRadius:16,padding:"4px 12px",cursor:"pointer",fontSize:11,fontWeight:700,color:C.roseMed}}>Today</button>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:8}}>
        {weekDays.map((day,di)=>{
          const dayPosts=getPostsForDay(day);
          const isToday=day.toISOString().slice(0,10)===todayStr();
          return <div key={di} style={{minHeight:160,background:isToday?C.pink+"55":C.white,borderRadius:12,border:`1.5px solid ${isToday?C.pinkMed:"rgba(0,0,0,0.07)"}`,padding:10,boxShadow:isToday?"0 0 0 2px "+C.pinkMed:"none"}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:13,textTransform:"uppercase",letterSpacing:"0.06em",color:isToday?C.pinkDeep:C.gray,marginBottom:4}}>{DAY_NAMES[day.getDay()]}</div>
            <div style={{fontSize:11,color:isToday?C.pinkDeep:C.gray,marginBottom:8,fontWeight:isToday?700:400}}>{day.toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
            {dayPosts.length===0&&<div style={{fontSize:11,color:"#ccc",fontStyle:"italic"}}>—</div>}
            {dayPosts.map(p=><div key={p.id} onClick={()=>openEdit(p)} style={{background:CONTENT_STATUS_COLORS[p.status]||C.lgray,borderRadius:8,padding:"5px 8px",marginBottom:5,cursor:"pointer",borderLeft:`3px solid ${PLATFORM_COLORS[p.platform]||C.gray}`}}>
              <div style={{fontSize:10,fontWeight:700,color:PLATFORM_COLORS[p.platform]||C.gray,marginBottom:2,textTransform:"uppercase",letterSpacing:"0.05em"}}>{p.platform}</div>
              <div style={{fontSize:12,fontWeight:600,color:C.charcoal,lineHeight:1.3,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{p.title}</div>
            </div>)}
            <button onClick={()=>{setForm({title:"",platform:"IG",pillar:"",status:"Idea",caption:"",postDate:day.toISOString().slice(0,10),notes:""});setEditing(null);setModal(true);}} style={{background:"none",border:`1px dashed ${C.roseMed}`,borderRadius:8,padding:"3px 0",width:"100%",fontSize:10,cursor:"pointer",color:C.roseMed,marginTop:4,fontWeight:700}}>+ add</button>
          </div>;
        })}
      </div>
    </div>}

    {/* Modal */}
    <Modal open={modal} onClose={()=>setModal(false)} title={editing?"Edit Post":"New Post"} color={C.roseMed}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div><Lbl>Post Title / Hook</Lbl><Inp value={form.title} onChange={v=>setForm({...form,title:v})} placeholder="What's the post about?"/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><Lbl>Platform</Lbl><Sel value={form.platform} onChange={v=>setForm({...form,platform:v})} options={PLATFORMS}/></div>
          <div><Lbl>Content Pillar</Lbl><Sel value={form.pillar} onChange={v=>setForm({...form,pillar:v})} options={PILLARS}/></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><Lbl>Status</Lbl><Sel value={form.status} onChange={v=>setForm({...form,status:v})} options={CONTENT_STATUSES}/></div>
          <div><Lbl>Post Date</Lbl><Inp type="date" value={form.postDate} onChange={v=>setForm({...form,postDate:v})}/></div>
        </div>
        <div><Lbl>Caption / Copy</Lbl><Txta value={form.caption} onChange={v=>setForm({...form,caption:v})} placeholder="Write your caption here…" rows={4}/></div>
        <div><Lbl>Notes</Lbl><Txta value={form.notes} onChange={v=>setForm({...form,notes:v})} placeholder="Hook ideas, hashtags, links, collab notes…" rows={2}/></div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <Btn outline color={C.gray} sm onClick={()=>setModal(false)}>Cancel</Btn>
          <Btn color={C.roseMed} onClick={save}>{editing?"Save Changes":"Add Post"}</Btn>
        </div>
      </div>
    </Modal>
  </div>;
}


// ── SYNC BUTTON COMPONENT ─────────────────────────────
function SyncButton(){
  const [open,setOpen]=useState(false);
  const [url,setUrl]=useState(store._url||"");
  const [status,setStatus]=useState("");
  const [syncing,setSyncing]=useState(false);

  const saveUrl=()=>{
    store.setUrl(url.trim());
    setStatus("URL saved. Click Sync Now to pull your data.");
  };

  const doSync=async()=>{
    if(!store._url){setStatus("Paste your Apps Script URL first.");return;}
    setSyncing(true);
    setStatus("Syncing…");
    const result=await store.syncAll();
    setStatus(result.msg);
    setSyncing(false);
    if(result.ok){setTimeout(()=>window.location.reload(),1500);}
  };

  return <div style={{position:"relative"}}>
    <button onClick={()=>setOpen(o=>!o)} style={{background:store._url?"rgba(195,192,219,0.25)":"rgba(255,255,255,0.06)",border:`1.5px solid ${store._url?C.lavMed:"rgba(255,255,255,0.15)"}`,borderRadius:10,padding:"5px 12px",cursor:"pointer",color:store._url?C.lavMed:"rgba(255,255,255,0.4)",fontSize:11,fontWeight:800,letterSpacing:"0.1em",textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",display:"flex",alignItems:"center",gap:6}}>
      {store._url?"☁ Sync On":"☁ Set Sync"}
    </button>
    {open&&<div style={{position:"absolute",right:0,top:"calc(100% + 8px)",background:C.charcoal,border:`1.5px solid ${C.lavMed}`,borderRadius:14,padding:20,width:360,zIndex:999,boxShadow:"0 12px 40px rgba(0,0,0,0.4)"}}>
      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:16,textTransform:"uppercase",letterSpacing:"0.06em",color:C.lavMed,marginBottom:12}}>☁ Cloud Sync</div>
      <div style={{fontSize:12,color:"rgba(255,255,255,0.5)",lineHeight:1.6,marginBottom:14}}>Paste your Google Apps Script URL to sync data across all your devices.</div>
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://script.google.com/macros/s/…/exec" style={{flex:1,background:"rgba(255,255,255,0.08)",border:`1.5px solid ${C.lavMed}44`,borderRadius:8,padding:"7px 10px",fontSize:11,color:"#fff",outline:"none",fontFamily:"inherit"}}/>
        <button onClick={saveUrl} style={{background:C.lavMed,border:"none",borderRadius:8,padding:"7px 14px",cursor:"pointer",color:"#fff",fontSize:11,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",whiteSpace:"nowrap"}}>Save</button>
      </div>
      <button onClick={doSync} disabled={syncing} style={{background:syncing?"rgba(255,255,255,0.1)":C.pinkMed,border:"none",borderRadius:8,padding:"8px 0",cursor:syncing?"not-allowed":"pointer",color:"#fff",fontSize:12,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",width:"100%",marginBottom:10}}>
        {syncing?"Syncing…":"↓ Sync Now (pull from cloud)"}
      </button>
      {status&&<div style={{fontSize:11,color:status.includes("error")||status.includes("failed")?"#FFB0B0":"#B0FFD0",lineHeight:1.5,marginBottom:8}}>{status}</div>}
      <div style={{fontSize:10,color:"rgba(255,255,255,0.25)",lineHeight:1.6,borderTop:"1px solid rgba(255,255,255,0.08)",paddingTop:10}}>
        Data auto-saves to cloud on every change once URL is set.<br/>
        On a new device: paste URL → Save → Sync Now → reload.
      </div>
      <button onClick={()=>setOpen(false)} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.3)",fontSize:11,marginTop:8,display:"block",width:"100%",textAlign:"right"}}>close ×</button>
    </div>}
  </div>;
}

// ── MAIN APP ──────────────────────────────────────────
function App(){
  const [activeTab,setActiveTab]=useState("hq");
  const [tasks,setTasks]=useState([]);
  const [projects,setProjects]=useState([]);
  const [inited,setInited]=useState(false);

  useEffect(()=>{
    setTasks(store.get("tasks",[]));
    setProjects(store.get("projects",[]));
    setInited(true);
  },[]);
  useEffect(()=>{if(inited){store.set("tasks",tasks);}},[tasks,inited]);
  useEffect(()=>{if(inited){store.set("projects",projects);}},[projects,inited]);

  const activeTabObj=TABS.find(t=>t.id===activeTab)||TABS[0];

  const renderTab=()=>{
    switch(activeTab){
      case"hq":return<HQTab tasks={tasks} projects={projects} goToTab={setActiveTab}/>;
      case"tasks":return<TasksTab tasks={tasks} setTasks={setTasks} projects={projects} goToTab={setActiveTab}/>;
      case"projects":return<ProjectsTab projects={projects} setProjects={setProjects}/>;
      case"money":return<MoneyTab/>;
      case"reset":return<ResetTab/>;
      case"bizops":return<BizOpsTab/>;
      case"moodboard":return<MoodboardTab/>;
      case"personal":return<PersonalTab/>;
      case"content":return<ContentTab/>;
      default:return null;
    }
  };

  return <div style={{minHeight:"100vh",background:`radial-gradient(ellipse at top left,${C.pink}55 0%,${C.lav}33 40%,${C.cream} 80%)`,backgroundAttachment:"fixed"}}>
    {/* Header */}
    <div style={{background:`linear-gradient(135deg,${C.charcoal} 0%,#2A1A2A 100%)`,padding:"14px 28px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 20px rgba(0,0,0,0.2)",position:"sticky",top:0,zIndex:100}}>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:26,textTransform:"uppercase",letterSpacing:"-0.01em",color:C.pinkMed,lineHeight:1}}>CHELA HQ.</div>
        <div style={{width:1,height:24,background:"rgba(255,255,255,0.1)"}}/>
        <div style={{fontSize:12,color:"rgba(255,255,255,0.4)",letterSpacing:"0.08em",textTransform:"uppercase",fontWeight:500}}>{new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</div>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        {[{n:tasks.filter(t=>t.status==="In Progress").length,l:"Active",c:C.yellow},{n:tasks.filter(t=>t.finishBy===todayStr()&&t.status!=="Done").length,l:"Due Today",c:C.rose},{n:projects.filter(p=>p.status==="Active").length,l:"Projects",c:C.mint}].map(({n,l,c})=><div key={l} style={{background:"rgba(255,255,255,0.06)",borderRadius:10,padding:"5px 12px",textAlign:"center"}}><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:18,color:c,lineHeight:1}}>{n}</div><div style={{fontSize:9,color:"rgba(255,255,255,0.35)",textTransform:"uppercase",letterSpacing:"0.1em"}}>{l}</div></div>)}
        <SyncButton/>
      </div>
    </div>

    {/* Tabs + Content */}
    <div style={{padding:"20px 24px 60px",maxWidth:1400,margin:"0 auto"}}>
      {/* Folder Tabs */}
      <div style={{display:"flex",flexWrap:"wrap",gap:2,paddingLeft:8,position:"relative",zIndex:2}}>
        {TABS.map(tab=>{
          const isActive=activeTab===tab.id;
          return <div key={tab.id} onClick={()=>setActiveTab(tab.id)} style={{background:isActive?tab.color:`${tab.color}77`,padding:isActive?"10px 18px 14px":"8px 16px 12px",borderRadius:"10px 10px 0 0",border:`2px solid ${isActive?tab.dark:"rgba(0,0,0,0.1)"}`,borderBottom:isActive?`2px solid ${tab.color}`:"2px solid rgba(0,0,0,0.08)",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:12,letterSpacing:"0.05em",color:isActive?C.charcoal:"rgba(0,0,0,0.45)",userSelect:"none",position:"relative",transition:"all 0.12s",whiteSpace:"nowrap",textTransform:"uppercase",zIndex:isActive?3:1,boxShadow:isActive?"0 -3px 10px rgba(0,0,0,0.06)":"none",marginBottom:isActive?0:2}}>{tab.emoji} {tab.label}</div>;
        })}
      </div>

      {/* Content Area */}
      <div style={{background:activeTabObj.content||C.white,borderRadius:"0 12px 12px 12px",border:`2px solid ${activeTabObj.dark}`,padding:"28px 28px 40px",minHeight:600,boxShadow:"0 8px 40px rgba(0,0,0,0.08)",position:"relative",zIndex:1}}>
        {!inited?<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:400,flexDirection:"column",gap:16}}><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:18,textTransform:"uppercase",letterSpacing:"0.1em",color:C.gray}}>Loading Chela HQ…</div></div>:renderTab()}
      </div>

      <div style={{textAlign:"center",marginTop:20,fontSize:11,color:"rgba(0,0,0,0.25)",letterSpacing:"0.1em",textTransform:"uppercase",fontWeight:600}}>✦ CMA. HQ · Chela Mitchell Art · chelamitchellart.com ✦</div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
